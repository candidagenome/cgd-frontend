# Wang_2024 JBrowse Track Configuration
# ======================================
# Study: PRJNA1086003 - Biofilm formation in C. auris
# Strains: AR0382, AR0387
# Conditions: In Vitro Biofilm (control) vs In Vivo Catheter (experimental)
# Samples: 13 total
#
# Add these entries to the JBrowse tracks.conf file
#
# File paths:
#   BAM files: raw/bam/Wang_2024/{SRR}.sorted.bam (flat structure)
#   BigWig files: raw/bam/Wang_2024/{SRR}/{SRR}_sorted_hits.bigwig (subdirectory)

# =============================================================================
# AR0382 - In Vitro Biofilm (control) - 3 replicates
# =============================================================================

[tracks.Wang_AR0382_InVitro_R1_alignments]
style.height = 7
key = Wang et al AR0382 In Vitro Biofilm (rep 1) alignments
storeClass = JBrowse/Store/SeqFeature/BAM
urlTemplate = raw/bam/Wang_2024/SRR28790270.sorted.bam
maxFeatureScreenDensity = 4
type = JBrowse/View/Track/Alignments2
style.color_fwd_strand = #898FD8
style.color_rev_strand = #EC8B8B

[tracks.Wang_AR0382_InVitro_R1_coverage]
storeClass = JBrowse/Store/SeqFeature/BigWig
urlTemplate = raw/bam/Wang_2024/SRR28790270/SRR28790270_sorted_hits.bigwig
key = Wang et al AR0382 In Vitro Biofilm (rep 1) coverage
type = JBrowse/View/Track/Wiggle/XYPlot
scoreType = maxScore
autoscale = local
style.pos_color = blue
style.height = 30

[tracks.Wang_AR0382_InVitro_R1_density]
storeClass = JBrowse/Store/SeqFeature/BigWig
urlTemplate = raw/bam/Wang_2024/SRR28790270/SRR28790270_sorted_hits.bigwig
key = Wang et al AR0382 In Vitro Biofilm (rep 1) density
type = JBrowse/View/Track/Wiggle/Density
scoreType = maxScore
autoscale = global
scale = log
bicolor_pivot = 0.1


<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="shortcut icon" href="favicon.ico"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#000000"/><meta name="description" content="A fast and flexible genome browser"/><link rel="manifest" href="manifest.json"/><title>JBrowse</title><style>*{overscroll-behavior-x:none}</style><script defer="defer" src="static/js/main.c54cb101.js"></script></head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div><script>
// Add "Select Tracks" label next to hamburger icon
const observer = new MutationObserver(() => {
  const btn = document.querySelector('button[title="Open track selector"]');
  if (btn && !btn.dataset.labeled) {
    btn.dataset.labeled = 'true';
    const label = document.createElement('span');
    label.textContent = 'Select Tracks';
    label.style.cssText = 'margin-left:6px;font-size:14px;font-weight:500;color:inherit;';
    btn.appendChild(label);
  }
});
observer.observe(document.body, { childList: true, subtree: true });
</script></body></html>
